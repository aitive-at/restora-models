# Phase 1 + Phase 2 + Video (temporal pair) unified training, NAFNet-tiny.
#
# Same as phase12-nafnet-tiny.yaml but with:
#   - video.enabled = true (DAVIS-2017 pairs from ~/data/laion-videos)
#   - temporal_pair loss in the stack (fires only on video batches)
#   - 25% of training batches drawn from video pairs
#
# Goal of this config: validate that adversarial refinement + temporal
# consistency compose cleanly. If both signals stay healthy through the
# warmup, we promote the recipe to the H200 nafnet-large run.

defaults: tiny.yaml

run:
  name: "phase12v-nafnet-tiny-${date:%Y-%m-%d_%H-%M-%S}"

model:
  type: nafnet
  size: tiny
  input_size: 256
  task_embed_dim: 128
  adversarial_refine: true
  refine_hidden_dim: 64
  refine_n_blocks: 4

data:
  root: "~/data/laion-images"
  val_fraction: 0.005
  num_fixed_preview_samples: 2
  num_random_preview_samples: 2
  loader:
    batch_size: 32
    num_workers: 16
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4

compound:
  identity_prob: 0.05
  axis_probs:
    colorize: 0.65
    denoise:  0.50
    sharpen:  0.50
    dejpeg:   0.50
    deblur:   0.50
  degradations:
    colorize: {}
    denoise:  { sigma_range: [0.005, 0.05] }
    sharpen:  { factor_choices: [2, 4, 8] }
    dejpeg:   { quality_range: [20, 70] }
    deblur:   { sigma_range: [1.0, 3.0], motion_prob: 0.2 }

losses:
  - {name: l1_rgb,             weight: 1.0}
  - {name: perceptual_vgg16bn, weight: 0.5,  config: {criterion: l1}}
  - {name: chroma_lab,         weight: 0.15, apply_to_axes: [colorize]}
  - {name: colorfulness,       weight: 0.05, apply_to_axes: [colorize]}
  - {name: freq_l1,            weight: 0.30, apply_to_axes: [sharpen]}
  - {name: gan,                weight: 0.05, config: {gan_type: hinge},
     apply_to_axes: [colorize, sharpen]}
  # Temporal consistency: L1 between flow-warped pred(frame_t) and
  # pred(frame_t+k). Only fires when video.enabled and a video batch is
  # drawn. Weight chosen so the loss is in the same magnitude as l1_rgb
  # (~0.05 typical on early training).
  - {name: temporal_pair,      weight: 0.5}

optim_g:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

optim_d:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 1000
  total_steps: 30000

train:
  total_steps: 30000
  amp: "bf16"
  preview_every_s: 60
  preview_history_every: 500
  ckpt_every_steps: 2500
  log_every_steps: 25
  gan_warmup_start: 5000
  gan_warmup_steps: 5000

video:
  enabled: true
  root: "~/data/laion-videos"
  max_skip: 5
  hflip_prob: 0.5
  require_flow: true
  video_batch_prob: 0.25
  batch_size: 16        # smaller bs since each video step does 2x forwards
  num_workers: 8

export:
  on_finish: true
