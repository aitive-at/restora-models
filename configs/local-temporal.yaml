# RTX PRO 6000 Blackwell (96GB VRAM, 45GB system RAM in WSL2)
# This is THE training config. ~12-15 hours for 100k steps with
# temporal_restora_small. For quick iteration runs, override with
# `--total-steps 5000` on the CLI (no need for a separate smoke config).
#
# Tuned per E2E validation (2026-05-17):
#  - lr 2e-4 (1e-3 diverged under LPIPS pressure)
#  - bs 12 (96GB VRAM has plenty of headroom for the 27M model at 256x256)
#  - num_workers capped at 6 (WSL2 system RAM is 45GB; prior 24-worker runs
#    crashed the host via dataloader RAM pressure, NOT VRAM)
#  - compile: true (~20% throughput, requires torch 2.4+)
#  - chroma_lab / colorfulness weights bumped in temporal_v1 preset (see
#    src/restora_models/config.py) for colorize axis convergence

defaults: default.yaml

run:
  name: "local_temporal"

model:
  type: "temporal_restora_small"

data:
  loader:
    # Bumped from 12 -> 32 after the data-pipeline refactor moved
    # degradation into DataLoader workers. The 27M `small` model at
    # 256x256 bf16 only uses ~21 GB at bs=12; bs=32 lands around ~55 GB
    # on the 96 GB Blackwell and lets the GPU spend more time compiling
    # per step instead of idling between batches.
    batch_size: 32
    # 6 workers stays inside the WSL2 RAM cap (see local-hardware memory).
    # Each worker now also runs the degradation pipeline, so keeping
    # prefetch_factor higher gives more headroom for stragglers.
    num_workers: 6
    prefetch_factor: 4
  sources:
    - type: reds
      root: "~/data/reds"
      split: "train_sharp"        # tried first; falls back to flat layout if missing
      window: 7
      stride: 1
      crop: 256
      weight: 4.0
  film_overlay_root: "~/data/film-overlays"

train:
  # 60k @ bs=32 ≈ 18 h on the local Blackwell at ~27 img/s. Sees ~1.9 M
  # samples vs the old 100k @ bs=12 = 1.2 M samples, in roughly the same
  # wall-clock. Drop to 100k only if quality plateaus before convergence
  # (track per-axis PSNR/LPIPS in TensorBoard — `<run>/tb/`).
  total_steps: 60000
  amp: bf16
  compile: true
  compile_mode: default
  memory_format: channels_last
  lr: 2.0e-4
  weight_decay: 0.01
  log_every: 100
  save_every: 5000

scheduler:
  total_steps: 60000
  warmup_steps: 1000

losses: !preset temporal_v1
