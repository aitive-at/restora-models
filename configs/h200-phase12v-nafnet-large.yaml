# Production unified Phase 1 + Phase 2 + Temporal training on H200.
#
# One `restora train --config configs/h200-phase12v-nafnet-large.yaml`
# launches the full pipeline:
#   Steps 0 - 50000:   Phase 1 — deterministic, refine head trains with
#                      reconstruction losses, no adversarial pressure.
#   Steps 50000 - 100000: GAN warmup — gan loss ramps from 0 to 0.05.
#   Steps 100000 - 500000: Phase 2 stable — adversarial + reconstruction.
#
# Video pair batches fire at 20% probability throughout. Image batches
# fire at 80%. The refine head is active from step 0; its initial output
# is ~identical to the deterministic coarse output (small-init proj_out
# + sigmoid-gated residual_scale near 0).

defaults: large.yaml

run:
  name: "h200-phase12v-nafnet-large-${date:%Y-%m-%d_%H-%M-%S}"

model:
  type: nafnet
  size: large
  input_size: 256
  task_embed_dim: 128
  adversarial_refine: true
  # Defaults: hidden_dim=128, n_blocks=8 (≈ 2.6M refine head params)
  refine_hidden_dim: 128
  refine_n_blocks: 8

data:
  root: "/workspace/data"
  val_fraction: 0.002
  num_fixed_preview_samples: 2
  num_random_preview_samples: 2
  loader:
    batch_size: 64        # cut from 96 to leave room for refine head + 2x video forward
    num_workers: 20
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 6

compound:
  identity_prob: 0.05
  axis_probs:
    colorize: 0.65
    denoise:  0.50
    sharpen:  0.50
    dejpeg:   0.50
    deblur:   0.50
  degradations:
    colorize: {}
    denoise:  { sigma_range: [0.005, 0.05] }
    sharpen:  { factor_choices: [2, 4, 8] }
    dejpeg:   { quality_range: [20, 70] }
    deblur:   { sigma_range: [1.0, 3.0], motion_prob: 0.2 }

losses:
  - {name: l1_rgb,             weight: 1.0}
  - {name: perceptual_vgg16bn, weight: 0.5,  config: {criterion: l1}}
  - {name: chroma_lab,         weight: 0.15, apply_to_axes: [colorize]}
  - {name: colorfulness,       weight: 0.05, apply_to_axes: [colorize]}
  - {name: freq_l1,            weight: 0.30, apply_to_axes: [sharpen]}
  - {name: gan,                weight: 0.05, config: {gan_type: hinge},
     apply_to_axes: [colorize, sharpen]}
  - {name: temporal_pair,      weight: 0.5}

optim_g:
  type: AdamW
  lr: 1.5e-4              # slightly conservative for production with GAN
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

optim_d:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 5000
  total_steps: 500000

train:
  total_steps: 500000
  amp: "bf16"
  preview_every_s: 120
  preview_history_every: 5000
  ckpt_every_steps: 10000
  log_every_steps: 50
  gan_warmup_start: 50000
  gan_warmup_steps: 50000

video:
  enabled: true
  root: "/workspace/data-videos"     # set to your DAVIS or synth-videos root
  max_skip: 5
  hflip_prob: 0.5
  require_flow: true
  video_batch_prob: 0.20
  batch_size: 32           # half of image bs since video does 2x forward
  num_workers: 8

export:
  on_finish: true
