# Phase 1 + Phase 2 unified training (NAFNet-tiny — for local validation).
#
# One `restora train --config configs/phase12-nafnet-tiny.yaml` invocation
# runs:
#   - Phase 1 (deterministic warmup): steps 0 - gan_warmup_start
#   - Phase 2 (adversarial fine-tune): steps gan_warmup_start - total_steps
#       (adversarial loss linearly ramps in over gan_warmup_steps)
#
# Model has `adversarial_refine: true` from step 0; the refine head is
# active and trains with reconstruction losses immediately. The GAN
# pressure ramps in via warmup so training stays stable.

defaults: tiny.yaml

run:
  name: "phase12-nafnet-tiny-${date:%Y-%m-%d_%H-%M-%S}"

model:
  type: nafnet
  size: tiny
  input_size: 256
  task_embed_dim: 128
  adversarial_refine: true
  # Smaller refine head for tiny model (proportional)
  refine_hidden_dim: 64
  refine_n_blocks: 4

data:
  root: "~/data/laion-images"
  val_fraction: 0.005
  num_fixed_preview_samples: 2
  num_random_preview_samples: 2
  loader:
    batch_size: 32
    num_workers: 16
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4

compound:
  identity_prob: 0.05
  axis_probs:
    colorize: 0.65
    denoise:  0.50
    sharpen:  0.50
    dejpeg:   0.50
    deblur:   0.50
  degradations:
    colorize: {}
    denoise:  { sigma_range: [0.005, 0.05] }
    sharpen:  { factor_choices: [2, 4, 8] }
    dejpeg:   { quality_range: [20, 70] }
    deblur:   { sigma_range: [1.0, 3.0], motion_prob: 0.2 }

# Reconstruction stack from start; GAN added via warmup at Phase 2.
losses:
  - {name: l1_rgb,             weight: 1.0}
  - {name: perceptual_vgg16bn, weight: 0.5,  config: {criterion: l1}}
  - {name: chroma_lab,         weight: 0.15, apply_to_axes: [colorize]}
  - {name: colorfulness,       weight: 0.05, apply_to_axes: [colorize]}
  - {name: freq_l1,            weight: 0.30, apply_to_axes: [sharpen]}
  # Adversarial — ramped from 0 -> 0.05 over the warmup window. Hits the
  # two ill-posed axes (colorize, sharpen). Discriminator is built
  # automatically when the "gan" loss is in the stack.
  - {name: gan,                weight: 0.05, config: {gan_type: hinge},
     apply_to_axes: [colorize, sharpen]}

optim_g:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

optim_d:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 1000        # LR warmup, separate from GAN warmup
  total_steps: 30000

train:
  total_steps: 30000
  amp: "bf16"
  preview_every_s: 60
  preview_history_every: 500
  ckpt_every_steps: 2500
  log_every_steps: 25
  # Phase boundary: pure deterministic for first 5k steps, then ramp
  # adversarial gradient in over the next 5k steps.
  gan_warmup_start: 5000
  gan_warmup_steps: 5000

export:
  on_finish: true
