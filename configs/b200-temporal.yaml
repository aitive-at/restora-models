# B200 (183GB VRAM). Production target: ~50h for 200k steps with large model.
# Inherits configs/default.yaml — only the deltas are listed below.

defaults: default.yaml

run:
  name: "b200_temporal"

model:
  type: "temporal_restora_large"

data:
  loader:
    batch_size: 12
    num_workers: 12
    prefetch_factor: 4
  sources:
    - type: reds
      root: "/workspace/data/REDS"
      split: "train_sharp"
      window: 7
      stride: 1
      crop: 256
      weight: 4.0
    - type: vimeo_septuplet
      root: "/workspace/data/vimeo-septuplet"
      split: "train"
      crop: 256
      weight: 1.0
  film_overlay_root: "/workspace/data/film-overlays"

train:
  total_steps: 200000
  amp: bf16
  compile: true
  compile_mode: default
  memory_format: channels_last
  lr: 1.0e-3
  weight_decay: 0.01
  log_every: 50
  save_every: 5000

scheduler:
  total_steps: 200000
  warmup_steps: 2000

losses: !preset temporal_v1
