# B200 SXM (180 GB HBM3e VRAM, ~28 CPU cores, ~280 GB RAM).
# Inherits everything from temporal-base.yaml; only the hardware-
# sensitive knobs are overridden.

defaults: temporal-base.yaml

run:
  name: "b200_temporal"

data:
  loader:
    # 180 GB VRAM → bs=64 targets ~110 GB steady-state (≈61% util),
    # leaves ~70 GB for compile graph + optimiser state.
    batch_size: 64
    # 28 cores → 16 workers.
    num_workers: 16
