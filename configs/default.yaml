# Base config inherited by all run configs. Smoke values; real configs override.

run:
  name: "default"
  root: "runs/"
  output_dir: ""
  seed: 0

model:
  type: "temporal_restora_small"
  input_size: 256
  task_embed_dim: 128

data:
  sources: []   # MUST be overridden by per-environment configs
  val_fraction: 0.01
  num_fixed_preview_samples: 2
  num_random_preview_samples: 1
  augment:
    hflip: true
    rotate90: false
  loader:
    batch_size: 4
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
  # Old-film degradation knobs (override null roots in per-env configs)
  film_overlay_root: null
  film_overlay_prob: 0.3
  film_color_cast_prob: 0.2
  gate_weave_prob: 0.2
  mpeg_transcode_prob: 0.1
  gate_weave_max_shift_px: 2.0

losses: !preset temporal_v1

optim:
  type: AdamW
  lr: 1.0e-3
  weight_decay: 0.01
  betas: [0.9, 0.95]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 1000
  total_steps: 100000

train:
  total_steps: 100000
  amp: bf16
  memory_format: channels_last
  compile: false
  compile_mode: default
  ema_decay: 0.999
  lr: 1.0e-3
  weight_decay: 0.01
  grad_accum_steps: 1
  clip_grad_norm: 1.0
  seed: 0
  log_every: 50
  save_every: 5000
  # Refresh runs/<name>/samples/latest.png every 60s wall-clock — keeps
  # the preview pipeline from eating into training throughput.
  preview_every_s: 60.0
  # Archive runs/<name>/samples/iter_NNNNNNN.png every 1000 steps.
  preview_history_every: 1000

export:
  on_finish: true
  opset: 17
  simplify: true
  dynamic_hw: true
