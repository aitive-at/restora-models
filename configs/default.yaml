run:
  name: "${date:%Y-%m-%d_%H-%M-%S}"
  output_dir: "runs/${date:%Y-%m-%d_%H-%M-%S}"
  seed: 0

model:
  type: nafnet
  size: tiny
  input_size: 256
  task_embed_dim: 128

data:
  val_fraction: 0.01
  num_fixed_preview_samples: 2
  num_random_preview_samples: 1
  augment:
    hflip: true
    rotate90: false
  loader:
    batch_size: 32
    num_workers: 16
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4

compound:
  identity_prob: 0.05
  axis_probs:
    colorize: 0.50
    denoise:  0.50
    sharpen:  0.50
    dejpeg:   0.50
    deblur:   0.50
  degradations:
    colorize: {}
    denoise:  { sigma_range: [0.005, 0.05] }
    sharpen:  { factor_choices: [2, 4, 8] }
    dejpeg:   { quality_range: [20, 70] }
    deblur:   { sigma_range: [1.0, 3.0], motion_prob: 0.2 }

losses: !preset standard

optim_g:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

optim_d:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 2000
  total_steps: 100000

train:
  total_steps: 100000
  amp: bf16
  memory_format: channels_last
  compile: false
  compile_mode: default
  ema_decay: 0.999
  grad_accum_steps: 1
  clip_grad_norm: 1.0
  preview_every_s: 10.0
  preview_history_every: 50
  ckpt_every_steps: 5000
  val_every_steps: 5000
  log_every_steps: 25

export:
  on_finish: true
  opset: 17
  simplify: true
  dynamic_hw: true
