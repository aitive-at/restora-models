# NAFNet-tiny — vivid recipe WITHOUT GAN (diagnostic A/B vs nafnet-tiny-vivid)
#
# Identical to nafnet-tiny-vivid.yaml except the `gan` loss entry is
# removed. This isolates whether GAN-from-cold is the cause of the
# stuck-loss training pathology observed on nafnet-tiny-vivid:
#
#   nafnet-tiny-vivid:        L1 + perceptual + chroma + colorfulness + freq + GAN (0.05, cold)
#   nafnet-tiny-vivid-nogan:  L1 + perceptual + chroma + colorfulness + freq
#
# If losses start moving with this config, GAN-from-cold is the culprit
# and the fix forward is GAN with warmup (weight=0 for ~10k steps, then
# linear ramp). If losses still don't move, the cause is elsewhere
# (Lab gradient bottleneck, bf16 instability, or wiring bug in the
# dual-head) and we keep digging.

defaults: tiny.yaml

run:
  name: "nafnet-tiny-vivid-nogan-${date:%Y-%m-%d_%H-%M-%S}"

model:
  type: nafnet
  size: tiny
  input_size: 256
  task_embed_dim: 128

data:
  root: "~/data/laion-images"
  val_fraction: 0.005
  num_fixed_preview_samples: 1
  num_random_preview_samples: 1
  loader:
    batch_size: 32
    num_workers: 16
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4

compound:
  identity_prob: 0.05
  axis_probs:
    colorize: 0.50
    denoise:  0.50
    sharpen:  0.50
    dejpeg:   0.50
    deblur:   0.50
  degradations:
    colorize: {}
    denoise:  { sigma_range: [0.005, 0.05] }
    sharpen:  { factor_choices: [2, 4, 8] }
    dejpeg:   { quality_range: [20, 70] }
    deblur:   { sigma_range: [1.0, 3.0], motion_prob: 0.2 }

# Proven balanced recipe (2026-05-14 iter-6 on nafnet-large):
# chroma_lab=0.10, colorfulness=0.05, freq_l1=0.30 sharpen-only,
# axis_probs=0.5 uniform — gives the strongest improvement across all
# tasks together. Higher chroma_lab weights crush easy tasks; lower
# weights don't anchor color. GAN deliberately omitted (destabilizes
# training from cold; introduce mid-training via curriculum if desired).
losses:
  - name: l1_rgb
    weight: 1.0
  - name: perceptual_vgg16bn
    weight: 0.5
    config:
      criterion: l1
  - name: chroma_lab
    weight: 0.10
    apply_to_axes: [colorize]
  - name: colorfulness
    weight: 0.05
    apply_to_axes: [colorize]
  - name: freq_l1
    weight: 0.30
    apply_to_axes: [sharpen]

optim_g:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 2000
  total_steps: 100000

train:
  total_steps: 100000
  amp: "bf16"
  preview_every_s: 60
  preview_history_every: 1000

export:
  on_finish: true
