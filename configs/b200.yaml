# Production training config for NVIDIA B200 (183 GB HBM3e, sm_100).
#
# Single command kicks off the full pipeline:
#   PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#       uv run restora train --config configs/b200.yaml --compile
#
# At bs=48 on B200 expect ~70-80h for 500k steps (was estimated 60h at
# bs=96, but that OOM'd). If you need to hit a 60h budget, reduce
# train.total_steps to ~350000 — the recipe still converges, just with
# less polish time after GAN warmup.
#
# Phase boundaries:
#   Steps 0-50000:        Phase 1 — deterministic + refine + temporal only
#   Steps 50000-100000:   GAN warmup — gan loss ramps 0 -> 0.05
#   Steps 100000-500000:  Phase 2 — all losses stable
#
# Memory budget on B200 (verified 2026-05-15 — bs=96 OOM'd at 178 GB,
# bs=64 ALSO OOM'd at 175 GB on Blackwell sm_100 because cuDNN workspace
# + refine-head AdaLN backward saves are larger than on Hopper sm_90):
#   ~120 GB VRAM (bs=48 image / bs=24 video pair + refine + discriminator)
#   ~55 GB headroom for previews, compile graph, EMA, fragmentation
#
# IMPORTANT: launch with
#   PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True uv run restora train ...
# The allocator's default segmented mode wastes 5-15 GB to fragmentation
# on this workload; expandable_segments recovers it.
#
# Loss recipe and axis probabilities are byte-identical to configs/local.yaml
# so the local smoke run is fully predictive of production dynamics.

defaults: large.yaml

run:
  name: "b200-${date:%Y-%m-%d_%H-%M-%S}"

model:
  type: nafnet
  size: large
  input_size: 256
  task_embed_dim: 128
  adversarial_refine: true
  refine_hidden_dim: 128
  refine_n_blocks: 8

data:
  root: "/workspace/data"
  val_fraction: 0.002
  num_fixed_preview_samples: 2
  num_random_preview_samples: 2
  loader:
    batch_size: 48           # cut from 96 -> 64 -> 48; bs=64 still OOM on B200
    num_workers: 12          # scaled with batch
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 3

# Axis probabilities: colorize gets a 0.65 bias (the hardest axis, the
# most ill-posed), everything else at 0.50. This is the recipe that
# produced iter-6's breakthrough deltas. A more aggressive 0.75/0.40
# split was tried earlier and crushed easy tasks via multi-task contention.
# Sharpen + colorize specialization comes from freq_l1, chroma_lab,
# colorfulness, ab-head, and the adversarial refine head — not axis_probs.
compound:
  identity_prob: 0.05
  axis_probs:
    colorize: 0.65
    denoise:  0.50
    sharpen:  0.50
    dejpeg:   0.50
    deblur:   0.50
  degradations:
    colorize: {}
    denoise:  { sigma_range: [0.005, 0.05] }
    sharpen:  { factor_choices: [2, 4, 8] }
    dejpeg:   { quality_range: [20, 70] }
    deblur:   { sigma_range: [1.0, 3.0], motion_prob: 0.2 }

losses:
  - {name: l1_rgb,             weight: 1.0}
  - {name: perceptual_vgg16bn, weight: 0.5,  config: {criterion: l1}}
  - {name: chroma_lab,         weight: 0.15, apply_to_axes: [colorize]}
  # colorfulness bumped 0.05 -> 0.08 ("vivid" preset value) for a slightly
  # stronger explicit-saturation push — based on the local smoke showing
  # colorize "partially works" at 20k steps with the standard 0.05.
  - {name: colorfulness,       weight: 0.08, apply_to_axes: [colorize]}
  - {name: freq_l1,            weight: 0.30, apply_to_axes: [sharpen]}
  - {name: gan,                weight: 0.05, config: {gan_type: hinge},
     apply_to_axes: [colorize, sharpen]}
  - {name: temporal_pair,      weight: 0.5}

optim_g:
  type: AdamW
  lr: 1.25e-4              # linear-scaling from bs=64@1.5e-4 -> bs=48 -> ~1.125e-4,
                           # rounded up modestly for slightly faster convergence
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

optim_d:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 5000
  total_steps: 500000

train:
  total_steps: 500000
  amp: "bf16"
  memory_format: channels_last
  ema_decay: 0.999
  clip_grad_norm: 1.0
  preview_every_s: 120
  preview_history_every: 5000          # 100 history snapshots
  ckpt_every_steps: 10000              # 50 overwrites of last.pt
  ckpt_history_every: 50000            # 10 numbered ckpts (iter_NNNNNNN.pt)
  log_every_steps: 50
  gan_warmup_start: 50000
  gan_warmup_steps: 50000

video:
  enabled: true
  root: "/workspace/data-videos"
  max_skip: 5
  hflip_prob: 0.5
  require_flow: true
  video_batch_prob: 0.20
  batch_size: 24            # half of image bs — video step does 2x forward
  num_workers: 6

export:
  on_finish: true
  opset: 17
  simplify: true
  dynamic_hw: true
