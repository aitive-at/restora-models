# Local smoke / pipeline-validation config for RTX PRO 6000 Blackwell (96 GB
# VRAM, 45 GB system RAM, WSL2 host).
#
# Differences vs production (configs/b200.yaml):
#  - Smaller batch, fewer workers (WSL2 host-RAM bottleneck).
#  - Adversarial GAN loss DISABLED. The GAN needs ~50k step warmup to
#    stabilize; production gives it that, smoke can't. When GAN is added
#    too quickly on top of a not-yet-converged generator, the discriminator
#    wins early and pushes the generator toward "predict the mean" outputs
#    (beige colorization is the classic symptom). The refine head is still
#    enabled — it just trains under reconstruction + perceptual losses only,
#    which matches the early Phase-1 dynamics in production.
#
# Architecture + non-GAN losses + axis_probs are identical to production,
# so reconstruction PSNR deltas here are predictive of production behavior.
#
# Memory budget:
#   VRAM:       ~25 GB of 96 GB (no disc → ~10 GB headroom vs GAN-on)
#   System RAM: ~18 GB of 45 GB
#
# Verification recipe after the run:
#   uv run python scripts/eval_checkpoints.py \
#     --ckpts runs/<smoke>/ckpt/iter_0001000.pt runs/<smoke>/ckpt/final.pt \
#     --data ~/data/laion-images --n 64 --seed 0
# Pass criteria: per-axis Δ PSNR > 0 for all 5 axes.

defaults: large.yaml

run:
  name: "local-${date:%Y-%m-%d_%H-%M-%S}"

model:
  type: nafnet
  size: large
  input_size: 256
  task_embed_dim: 128
  adversarial_refine: true
  refine_hidden_dim: 128
  refine_n_blocks: 8

data:
  root: "~/data/laion-images"
  val_fraction: 0.005
  num_fixed_preview_samples: 2
  num_random_preview_samples: 2
  loader:
    batch_size: 16
    num_workers: 6
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2

# Axis probabilities: colorize gets a modest 0.65 bias (the hardest axis,
# the most ill-posed), everything else at 0.50. This is the recipe that
# produced iter-6's breakthrough deltas (colorize +1.26 / sharpen +2.60 /
# dejpeg +1.61 / deblur +1.69 / denoise +0.46 dB over 1000 steps).
#
# A more aggressive 0.75/0.40 split was tried earlier and caused
# multi-task contention that crushed the easy tasks. Sharpen already gets
# strong specialization from freq_l1 loss + factor variety (2x/4x/8x);
# colorize gets chroma_lab + colorfulness + ab-head + adversarial refine.
# The architecture, not axis_probs, is doing the heavy lifting for the
# hard tasks.
compound:
  identity_prob: 0.05
  axis_probs:
    colorize: 0.65
    denoise: 0.50
    sharpen: 0.50
    dejpeg: 0.50
    deblur: 0.50
  degradations:
    colorize: {}
    denoise: { sigma_range: [0.005, 0.05] }
    sharpen: { factor_choices: [2, 4, 8] }
    dejpeg: { quality_range: [20, 70] }
    deblur: { sigma_range: [1.0, 3.0], motion_prob: 0.2 }

losses:
  - { name: l1_rgb, weight: 1.0 }
  - { name: perceptual_vgg16bn, weight: 0.5, config: { criterion: l1 } }
  - { name: chroma_lab, weight: 0.15, apply_to_axes: [colorize] }
  # colorfulness 0.08 (was 0.05) — slightly stronger saturation push;
  # matches configs/b200.yaml so smoke remains predictive of production.
  - { name: colorfulness, weight: 0.08, apply_to_axes: [colorize] }
  - { name: freq_l1, weight: 0.30, apply_to_axes: [sharpen] }
  # gan disabled in smoke — see header. Production (b200.yaml) keeps it
  # with a 50k step warmup at 10-20% into training.
  - { name: temporal_pair, weight: 0.5 }

optim_g:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

optim_d:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 500
  # Note: the trainer actually reads train.total_steps for the LR schedule;
  # this field is documentation only. Kept in sync to avoid future confusion.
  total_steps: 50000

train:
  total_steps: 50000
  amp: "bf16"
  memory_format: channels_last
  ema_decay: 0.999
  clip_grad_norm: 1.0
  preview_every_s: 60
  preview_history_every: 1000      # 50 history snapshots over the run
  ckpt_every_steps: 1000           # 50 overwrites of last.pt
  ckpt_history_every: 5000         # 10 numbered ckpts for eval comparison
  log_every_steps: 25
  # GAN disabled in smoke; these have no effect with no gan loss in the stack
  gan_warmup_start: 0
  gan_warmup_steps: 0

video:
  enabled: true
  root: "~/data/laion-videos" # DAVIS-2017, requires precomputed RAFT flow
  max_skip: 3
  hflip_prob: 0.5
  require_flow: true
  video_batch_prob: 0.20
  batch_size: 8
  num_workers: 4

export:
  on_finish: true
  opset: 17
  simplify: true
  dynamic_hw: true
