# 50k-step local training on RTX PRO 6000 Blackwell (96 GB VRAM, WSL2).
#
# Use this AFTER `configs/local-smoke.yaml` validates the pipeline. This
# config bumps batch + step count to produce a real PSNR signal locally
# before committing the B200 to a 60h+ run.
#
# Expected wall time: ~4-6 hours on RTX PRO 6000 Blackwell.
#
# Phase boundaries:
#   Steps 0-10000:    Phase 1 — deterministic + refine + temporal only
#   Steps 10000-20000: GAN warmup — gan loss ramps 0 -> 0.05
#   Steps 20000-50000: Phase 2 — all losses stable
#
# Memory budget (target):
#   VRAM: ~55 GB of 96 GB (40 GB headroom for previews + driver overhead)
#   System RAM: ~25 GB of 45 GB
#
# Verification: compare iter_0005000.pt against iter_0050000.pt — see
# the file header of configs/local-smoke.yaml for the eval invocation.

defaults: large.yaml

run:
  name: "local-blackwell-50k-${date:%Y-%m-%d_%H-%M-%S}"

model:
  type: nafnet
  size: large
  input_size: 256
  task_embed_dim: 128
  adversarial_refine: true
  refine_hidden_dim: 128
  refine_n_blocks: 8

data:
  root: "~/data/laion-images"
  val_fraction: 0.002
  num_fixed_preview_samples: 2
  num_random_preview_samples: 2
  loader:
    batch_size: 24             # was 32 in the crashed config; -25% for stability
    num_workers: 8             # was 16 — WSL2-safe
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2

compound:
  identity_prob: 0.05
  axis_probs:
    colorize: 0.65
    denoise:  0.50
    sharpen:  0.50
    dejpeg:   0.50
    deblur:   0.50
  degradations:
    colorize: {}
    denoise:  { sigma_range: [0.005, 0.05] }
    sharpen:  { factor_choices: [2, 4, 8] }
    dejpeg:   { quality_range: [20, 70] }
    deblur:   { sigma_range: [1.0, 3.0], motion_prob: 0.2 }

losses:
  - {name: l1_rgb,             weight: 1.0}
  - {name: perceptual_vgg16bn, weight: 0.5,  config: {criterion: l1}}
  - {name: chroma_lab,         weight: 0.15, apply_to_axes: [colorize]}
  - {name: colorfulness,       weight: 0.05, apply_to_axes: [colorize]}
  - {name: freq_l1,            weight: 0.30, apply_to_axes: [sharpen]}
  - {name: gan,                weight: 0.05, config: {gan_type: hinge},
     apply_to_axes: [colorize, sharpen]}
  - {name: temporal_pair,      weight: 0.5}

optim_g:
  type: AdamW
  lr: 1.25e-4              # mid-way between smoke (1e-4) and h200 (2e-4)
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

optim_d:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  warmup_steps: 1500
  total_steps: 50000

train:
  total_steps: 50000
  amp: "bf16"
  memory_format: channels_last
  ema_decay: 0.999
  clip_grad_norm: 1.0
  preview_every_s: 90
  preview_history_every: 2500           # 20 history snapshots
  ckpt_every_steps: 5000                # 10 overwrites of last.pt
  ckpt_history_every: 10000             # 5 numbered ckpts for eval
  log_every_steps: 50
  gan_warmup_start: 10000
  gan_warmup_steps: 10000

video:
  enabled: true
  root: "~/data/laion-videos"
  max_skip: 3
  hflip_prob: 0.5
  require_flow: true
  video_batch_prob: 0.20
  batch_size: 12              # half image bs
  num_workers: 4

export:
  on_finish: true
  opset: 17
  simplify: true
  dynamic_hw: true
