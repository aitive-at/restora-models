# Large model for LAION shard (~23K usable images at 256x256).
# Inherits every stability fix and recipe lesson from the tiny run:
#   - refine_norm: spectral  (BatchNorm here would re-trigger gray collapse)
#   - losses: standard       (l1+perceptual+colorfulness; colorfulness is
#                             required to escape the "predict zero AB" basin
#                             when training without a GAN)
#   - amp: bf16 + grad-norm guard (auto-skips Inf-gradient steps; in-trainer)
#   - memory_format: channels_last
# Auto-emits BOTH model.onnx (fixed at input_size) and model_dynamic.onnx
# (any (B,3,H,W)) at the end of training.
#
# Tuned for NVIDIA RTX PRO 6000 Blackwell Max-Q (96 GB).

defaults: default.yaml

run:
  name: "laion-large-${date:%Y-%m-%d_%H-%M-%S}"

model:
  size: large
  input_size: 256
  refine_norm: spectral

data:
  val_fraction: 0.005
  num_fixed_preview_samples: 4
  num_random_preview_samples: 2
  loader:
    # Large ConvNeXt has ~228M params (~6x tiny). Batch 32 verified at
    # bf16/channels-last on 96 GB (~42 GB peak, 54 GB headroom) — 86 img/s
    # → ~10.3h for 100K steps. Can push to 48 or 64 if more throughput
    # is wanted; F.pad's 32-bit index limit caps batch at ~64 for nf=512.
    batch_size: 32
    num_workers: 16
    prefetch_factor: 4

losses: !preset standard

optim_g:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.99]
  fused: true

optim_d:
  type: AdamW
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.99]
  fused: true

scheduler:
  type: cosine
  # Slightly longer warmup than tiny: large models benefit from a slower
  # ramp into peak LR because each step moves more parameters.
  warmup_steps: 3000
  total_steps: 100000

train:
  total_steps: 100000
  amp: bf16
  memory_format: channels_last
  # torch.compile gives ~15% throughput on Blackwell at the cost of a
  # ~2-minute first-step warmup. Off by default; enable with --compile.
  compile: false
  compile_mode: default
  ema_decay: 0.999
  grad_accum_steps: 1
  clip_grad_norm: 1.0
  preview_every_s: 10.0
  preview_history_every: 50
  ckpt_every_steps: 5000
  val_every_steps: 5000
  log_every_steps: 25
  color_enhance: true
  color_enhance_factor: 1.2

export:
  on_finish: true
  opset: 17
  simplify: true
  # Emit BOTH model.onnx (fixed) and model_dynamic.onnx (any H/W) at end.
  dynamic_hw: true
