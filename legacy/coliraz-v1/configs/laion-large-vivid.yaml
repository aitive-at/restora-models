# Large model, "vivid" recipe — same architecture and stability lessons
# as laion-large.yaml plus two colorfulness boosters:
#
#   1. colorfulness loss weight bumped 0.5 -> 2.0 (4x stronger pressure
#      to maximize the Hasler-Susstrunk colorfulness metric)
#   2. train.color_enhance = true: gt_rgb is saturation-boosted by 1.2x
#      before the perceptual loss sees it, so the model learns to match
#      a more saturated target. L1 still uses original gt_ab — productive
#      tension between "match exactly" and "be more vivid".
#
# Everything else (model size, batch, AMP, refine_norm, optimizer, scheduler,
# export, EMA) is identical to laion-large.yaml.

defaults: laion-large.yaml

run:
  name: "laion-large-vivid-${date:%Y-%m-%d_%H-%M-%S}"

# Override the `standard` preset to bump colorfulness.
losses:
  - name: l1_ab
    weight: 0.1
  - name: perceptual_vgg16bn
    weight: 5.0
    config:
      layer_weights:
        conv1_1: 0.0625
        conv2_1: 0.125
        conv3_1: 0.25
        conv4_1: 0.5
        conv5_1: 1.0
      criterion: l1
  - name: colorfulness
    weight: 2.0

train:
  color_enhance: true
  color_enhance_factor: 1.2
